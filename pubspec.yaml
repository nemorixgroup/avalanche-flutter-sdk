name: avalanche_flutter_sdk
description: "The first native Flutter/Dart SDK for the Avalanche network. Pure Dart, no platform channels. Covers C-Chain EVM, Data API (Glacier), P-Chain staking, and X-Chain native assets."
version: 0.0.3-dev
homepage: https://github.com/nemorixgroup/avalanche-flutter-sdk
repository: https://github.com/nemorixgroup/avalanche-flutter-sdk
issue_tracker: https://github.com/nemorixgroup/avalanche-flutter-sdk/issues

topics:
  - avalanche
  - blockchain
  - avax
  - flutter
  - web3

platforms:
  android:
  ios:
  macos:
  windows:
  linux:
  
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  meta: ^1.15.0
  pointycastle: ^4.0.0

dev_dependencies:
  build_runner: ^2.4.9
  coverage: ^1.7.2
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  very_good_analysis: ^6.0.0
  