# ============================================================
# CI Pipeline - avalanche_flutter_sdk
# Runs on every PR and push to main/develop
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ---- Section: Quality Gate ----
  quality:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ---- Format ----
      - name: Check formatting
        run: dart format --set-exit-if-changed .

      # ---- Analyze ----
      - name: Run analyzer
        run: dart analyze --fatal-infos

      # ---- Test ----
      - name: Run tests with coverage
        run: flutter test --coverage

      # ---- Coverage Threshold ----
      - name: Check coverage threshold (85%)
        run: |
          sudo apt-get install -y lcov
          lcov --summary coverage/lcov.info
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -o '[0-9]*\.[0-9]*%' | head -1 | tr -d '%')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 85% threshold"
            exit 1
          fi
          echo "Coverage check passed: $COVERAGE%"

      # ---- pub.dev dry run ----
      - name: pub publish dry-run
        run: dart pub publish --dry-run

  # ---- Section: Integration Tests (Fuji Testnet) ----
  integration:
    name: Integration Tests (Fuji)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests against Fuji Testnet
        run: flutter test integration_test/
        env:
          AVALANCHE_NETWORK: fuji
        continue-on-error: true
        